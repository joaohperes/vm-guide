<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="">

<main class="hub-main">
  <div class="hub-hero">
    <h1>VM Guide — Ventilação Mecânica</h1>
    <p>Guia prático de ventilação mecânica, indutores para RSI e sedoanalgesia, baseado em UpToDate 2026, FCCS e diretrizes. Escolha um tema abaixo, use a busca (<strong>⌘K</strong>) ou ative o <strong>Modo Plantão</strong> para ver só as tabelas essenciais.</p>
  </div>
  <div id="hub-content"></div>
</main>

<script src="assets/app.js"></script>
<script>
// Monta o hub a partir do índice global PAGES (definido em app.js)
(function(){
  const wrap=document.getElementById('hub-content');
  let html='';let lastCat=null;
  PAGES.forEach(p=>{
    if(p.cat!==lastCat){
      if(lastCat!==null)html+='</div>';
      html+='<div class="hub-cat">'+p.cat+'</div><div class="hub-grid">';
      lastCat=p.cat;
    }
    html+='<a class="hub-card" href="'+p.file+'">'+
      '<div class="hc-title">'+p.title+'</div>'+
      '<div class="hc-sub">'+(p.subtitle||'')+'</div>'+
      '<span class="hc-arrow">Abrir →</span></a>';
  });
  if(lastCat!==null)html+='</div>';
  wrap.innerHTML=html;
})();
</script>
</body>
</html>
