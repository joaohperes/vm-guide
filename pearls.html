<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearls & Pitfalls — VM Guide</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .pp-filters{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 24px}
  .pp-tag{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
  .pp-tag:hover{border-color:var(--border2);color:var(--text)}
  .pp-tag.active{color:var(--teal);background:var(--teal-bg);border-color:var(--teal-d)}
  .pp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:18px}
  .pp-card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
  .pp-card-title{font-size:15px;font-weight:600;color:#e8ecf2}
  .pp-cat{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);background:rgba(124,111,247,.1);border:1px solid rgba(124,111,247,.25);padding:3px 10px;border-radius:20px;white-space:nowrap}
  .pp-cenario{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;font-style:italic}
  .pp-row{border-left:3px solid;border-radius:0 6px 6px 0;padding:11px 15px;margin:10px 0;font-size:13.5px;line-height:1.65}
  .pp-row .pp-lbl{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:5px}
  .pp-pearl{border-color:var(--teal);background:rgba(29,184,138,.08);color:#bce8d8}
  .pp-pearl .pp-lbl{color:var(--teal)}
  .pp-pitfall{border-color:var(--red);background:rgba(226,75,74,.08);color:#f0b8b8}
  .pp-pitfall .pp-lbl{color:var(--red)}
  .pp-why{border-color:var(--border2);background:var(--bg3);color:var(--text2)}
  .pp-why .pp-lbl{color:var(--text3)}
  .pp-row strong{color:#e8ecf2;font-weight:500}
  .pp-empty{color:var(--text3);font-size:13px;padding:20px 0}
</style>
</head>
<body data-page="pearls">
<main class="main">
<section class="section" id="pearls">
  <h1 class="section-title">Pearls &amp; Pitfalls</h1>
  <p class="section-subtitle">Cenários de plantão: o raciocínio correto, o erro comum e o porquê do mecanismo.</p>

  <div class="pp-filters" id="pp-filters"></div>
  <div id="pp-cards"></div>
</section>
</main>
<script src="assets/app.js"></script>
<script>
// ============================================================
// Dados: adicione novos cards a este array — sem mexer no HTML.
// Campos: categoria, titulo, cenario, pearl, pitfall, porque
// ============================================================
const pearls = [
  {
    categoria: 'Contusão pulmonar',
    titulo: 'PEEP vs VAC',
    cenario: 'Politrauma com contusão pulmonar bilateral, atelectasia progressiva, dessaturação aguda em VCV com PEEP 6 e VAC baixo.',
    pearl: 'Usar PEEP como ferramenta de recrutamento. Aumentar PEEP gradualmente (ex: 6 → 12) monitorando Pplatô e driving pressure. Manter VAC em 6 mL/kg de peso predito. Aceitar hipercapnia permissiva se necessário.',
    pitfall: 'Aumentar VAC como resposta primária à dessaturação. Em contusão pulmonar (padrão SDRA-like), o pulmão é heterogêneo — volume maior concentra estresse nas unidades ainda aeradas, aumentando VILI.',
    porque: 'A contusão pulmonar cria um "baby lung" funcional com áreas de consolidação, edema hemorrágico e pulmão aerado intercalados. O recrutamento deve ser feito por pressão (PEEP), não por volume. O VAC alto não recruta — apenas sobredistende o que já está aberto.'
  },
  {
    categoria: 'Contusão pulmonar',
    titulo: 'Fibroscopia vs PEEP',
    cenario: 'Atelectasia bilateral por hipoventilação e PEEP insuficiente. Colega propõe fibroscopia como manobra de recrutamento.',
    pearl: 'Fibroscopia tem indicação quando a atelectasia é obstrutiva — rolha de muco, coágulo ou secreção espessa bloqueando brônquio segmentar/lobar. Nesse contexto, aspira o obstáculo e o pulmão reexpande.',
    pitfall: 'Usar fibro como substituto de PEEP para colapso por hipoventilação. Fibro não recruta pulmão — ela desobstrui via aérea. Sem PEEP adequado depois, o pulmão volta a colapsar.',
    porque: 'São dois mecanismos distintos de atelectasia. Obstrutiva → fibro. Por hipoventilação/PEEP insuficiente → otimização de parâmetros. Mesmo quando a fibro está indicada, não dispensa PEEP adequado na sequência.'
  }
];

let filtroAtivo = 'Todos';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}

function renderFiltros(){
  const cats = ['Todos', ...Array.from(new Set(pearls.map(p=>p.categoria)))];
  document.getElementById('pp-filters').innerHTML = cats.map(c=>
    '<button class="pp-tag'+(c===filtroAtivo?' active':'')+'" onclick="setFiltro(\''+escAttr(c)+'\')">'+esc(c)+'</button>'
  ).join('');
}
function setFiltro(c){filtroAtivo=c;render();}

function renderCards(){
  const lista = filtroAtivo==='Todos' ? pearls : pearls.filter(p=>p.categoria===filtroAtivo);
  const wrap = document.getElementById('pp-cards');
  if(!lista.length){wrap.innerHTML='<div class="pp-empty">Nenhum card nesta categoria.</div>';return;}
  wrap.innerHTML = lista.map(p=>
    '<div class="pp-card">'+
      '<div class="pp-card-head">'+
        '<span class="pp-card-title">'+esc(p.titulo)+'</span>'+
        '<span class="pp-cat" onclick="setFiltro(\''+escAttr(p.categoria)+'\')" style="cursor:pointer">'+esc(p.categoria)+'</span>'+
      '</div>'+
      '<div class="pp-cenario">'+esc(p.cenario)+'</div>'+
      '<div class="pp-row pp-pearl"><span class="pp-lbl">✓ Pearl</span>'+esc(p.pearl)+'</div>'+
      '<div class="pp-row pp-pitfall"><span class="pp-lbl">✗ Pitfall</span>'+esc(p.pitfall)+'</div>'+
      '<div class="pp-row pp-why"><span class="pp-lbl">Por quê</span>'+esc(p.porque)+'</div>'+
    '</div>'
  ).join('');
}
function render(){renderFiltros();renderCards();}
render();
</script>
</body>
</html>
