<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — VM Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="quiz">
<main class="main">
<section class="section" id="quiz">
  <h1 class="section-title">Caso Clínico Interativo <a class="share-link" href="#quiz" onclick="copyLink(event,'#quiz')"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></a></h1>
  <p class="section-subtitle">Quiz de múltipla escolha — ventilação mecânica e farmacologia</p>

  <div class="quiz-box" id="quiz-container">
    <!-- Score screen -->
    <div class="quiz-score" id="quiz-score">
      <div class="score-num" id="score-num">0/5</div>
      <div class="score-label">Questões corretas</div>
      <div style="margin-top:20px">
        <button class="quiz-btn primary" onclick="restartQuiz()">Reiniciar quiz</button>
      </div>
    </div>
    <!-- Question screen -->
    <div id="quiz-question-screen">
      <div class="quiz-case" id="quiz-case"></div>
      <div class="quiz-question" id="quiz-question"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="quiz-nav">
        <button class="quiz-btn primary" id="quiz-next-btn" onclick="nextQuestion()" style="display:none">Próxima questão →</button>
        <span class="quiz-progress" id="quiz-progress"></span>
      </div>
    </div>
  </div>
</section>
</main>
<script src="assets/app.js"></script>
</body>
</html>
